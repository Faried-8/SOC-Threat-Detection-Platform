version: '3.9'

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: soc
      POSTGRES_PASSWORD: socpassword
      POSTGRES_DB: socplatform
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U soc"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://soc:socpassword@db:5432/socplatform
      SECRET_KEY: enterprise-soc-secret-key-change-in-production
      ENVIRONMENT: production
      CORS_ORIGINS: "http://localhost:3000,http://frontend:80"
    ports:
      - "8000:8000"
    volumes:
      - backend_outputs:/app/outputs
      - backend_reports:/app/reports
      - backend_pcaps:/app/pcaps
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  backend_outputs:
  backend_reports:
  backend_pcaps:
